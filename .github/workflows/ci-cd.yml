name: CI/CD Pipeline

on:
  push:
    branches:
      - "**" # This ensures the workflow triggers on ANY push to ANY branch

jobs:
  # ==========================================
  # 1. CI: Test if everything is good
  # ==========================================
  ci-test:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        # 1. Build AND Start the containers in the background
      - name: Build & Start Dev Docker Containers
        run: docker compose -f docker-compose-dev.yml up -d --build

        # 2. Give the containers a few seconds to fully boot up
      - name: Wait for services to initialize
        run: sleep 10

        # 3. Test Frontend Connectivity (Replace 3000 with your actual frontend port)
      - name: Test Frontend Container
        run: |
          # --fail makes curl exit with an error if the HTTP status is 400 or 500
          curl --fail http://localhost:3000 || exit 1

        # 4. Test Backend Connectivity (Replace 8080 with your actual backend port)
      - name: Test Backend Container
        run: |
          curl --fail http://localhost:8080 || exit 1

        # 5. Clean up
      - name: Stop Containers
        run: docker compose -f docker-compose-dev.yml down

  # ==========================================
  # 2. CD: Deploy ONLY if pushed to main
  # ==========================================
  cd-deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci-test # IMPORTANT: Wait for CI job to finish and pass!
    if: github.ref == 'refs/heads/main' # ONLY run if the push is to the 'main' branch

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # These pull from GitHub Secrets (see Step 3 below)
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the directory where your app lives on your server
            cd /home/${{ secrets.SERVER_USER }}/Desktop/eucan/

            # 2. Pull the latest code from the main branch
            git pull origin main

            # 3. Spin down current production containers, rebuild, and spin back up
            # (Or replace this with `make deploy` if you have that in your Makefile)
            docker compose -f docker-compose.yml down
            docker compose -f docker-compose.yml up -d --build --force-recreate
